<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Cartões - Finix Banco</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/script.js/cartoes.js">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <h2><i class="fas fa-university"></i> Finix Banco</h2>
            </div>
            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="principal.html">Início</a></li>
                    <li><a href="servicos.html">Serviços</a></li>
                    <li><a href="principal.html#contact">Contato</a></li>
                    <li><a href="abrir-conta.html">Abrir Conta</a></li>
                    <li class="login-btn"><a href="principal.html#login">Entrar</a></li>
                </ul>
                <div class="hamburger"><span></span><span></span><span></span></div>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>Cartões de Crédito</h1>
            <p>Solicite seu cartão com cashback e recompensas</p>
            <div class="account-form-container">
                <form id="cartao-form" class="contact-form">
                    <input type="text" placeholder="Nome Completo" required>
                    <input type="email" placeholder="Email" required>
                    <input type="text" placeholder="CPF" pattern="\d{11}" required>
                    <input type="number" placeholder="Limite desejado (R$)" step="1000">
                    <button type="submit" class="cta-btn">Solicitar Cartão</button>
                </form>
            </div>
        </div>
    </section>

    <div id="login-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Login</h2>
            <form class="login-form" id="login-form">
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Senha" required>
                <button type="submit">Entrar</button>
            </form>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Finix Banco. Todos os direitos reservados.</p>
        </div>
    </footer>
</body>
</html>
