<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>App Mobile - Finix Banco</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <header class="header">
        <div class="container">
            <div class="logo">
                <h2><i class="fas fa-university"></i> Finix Banco</h2>
            </div>
            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="principal.html">Início</a></li>
                    <li><a href="servicos.html">Serviços</a></li>
                    <li><a href="principal.html#contact">Contato</a></li>
                    <li><a href="abrir-conta.html">Abrir Conta</a></li>
                    <li class="login-btn"><a href="principal.html#login">Entrar</a></li>
                </ul>
                <div class="hamburger"><span></span><span></span><span></span></div>
            </nav>
        </div>
    </header>

    <section class="hero">
        <div class="container">
            <h1>App Finix Mobile</h1>
            <p>Banqueiro completo no seu bolso - iOS e Android</p>
            <div style="text-align:center; padding: 2rem;">
                <i class="fas fa-mobile-alt" style="font-size:5rem; color:#10b981; margin-bottom:1rem;"></i>
                <p>Scan QR ou busque 'Finix Banco' nas lojas de apps</p>
                <a href="#" class="cta-btn" style="margin:0 1rem;">App Store</a>
                <a href="#" class="cta-btn" style="margin:0 1rem;">Google Play</a>
            </div>
        </div>
    </section>

    <!-- Shared login modal & script (same as others, no protection needed for info page) -->
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Login</h2>
            <form class="login-form" id="login-form">
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Senha" required>
                <button type="submit">Entrar</button>
            </form>
        </div>
    </div>

    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Finix Banco. Todos os direitos reservados.</p>
        </div>
    </footer>

    <script>
        // Shared login/nav (no redirect protection)
        const hamburger = document.querySelector('.hamburger'), navList = document.querySelector('.nav-list');
        hamburger?.addEventListener('click', () => navList.classList.toggle('active'));
        if (localStorage.getItem('isLoggedIn') === 'true') document.querySelector('.login-btn').innerHTML = `<a href="#" onclick="handleLogout()">Sair</a>`;
        window.handleLogin = async (formData) => {/* same */}; window.handleLogout = () => { localStorage.removeItem('isLoggedIn'); location.reload(); };
        // Modal handlers same as others...
        const loginBtn = document.querySelector('.login-btn a'), modal = document.getElementById('login-modal'), close = document.querySelector('.close');
        if (loginBtn) loginBtn.addEventListener('click', (e) => { e.preventDefault(); modal.style.display = 'flex'; });
        close?.addEventListener('click', () => modal.style.display = 'none');
        document.getElementById('login-form')?.addEventListener('submit', (e) => {/* same login */});
        window.addEventListener('click', (e) => { if (e.target === modal) modal.style.display = 'none'; });
    </script>
</body>
</html>
