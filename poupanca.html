<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Conta Poupança - Finix Banco</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
    <link rel="stylesheet" href="/script.js/poupança.js">
</head>
<body>
    <!-- Header (same as above) -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <h2><i class="fas fa-university"></i> Finix Banco</h2>
            </div>
            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="principal.html#home">Início</a></li>
                    <li><a href="servicos.html">Serviços</a></li>
                    <li><a href="principal.html#contact">Contato</a></li>
                    <li><a href="abrir-conta.html">Abrir Conta</a></li>
                    <li class="login-btn"><a href="principal.html#login">Entrar</a></li>
                </ul>
                <div class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </nav>
        </div>
    </header>

    <!-- Hero -->
    <section class="hero">
        <div class="container">
            <h1>Conta Poupança</h1>
            <p>Faça seu dinheiro render com nossos juros competitivos</p>
            <div class="account-form-container">
                <form id="poupanca-form" class="contact-form">
                    <input type="number" placeholder="Valor atual da poupança (R$)" id="valor-poupanca" step="0.01" required>
                    <input type="number" placeholder="Taxa mensal (%)" id="taxa" value="0.8" step="0.01">
                    <input type="number" placeholder="Meses para render" id="meses" value="12">
                    <button type="submit" class="cta-btn">Calcular Rendimento</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Login Modal (same) -->
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Login</h2>
            <form class="login-form" id="login-form">
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Senha" required>
                <button type="submit">Entrar</button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; 2024 Finix Banco. Todos os direitos reservados.</p>
        </div>
    </footer>
</body>
</html>
