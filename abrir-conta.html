<!DOCTYPE html>
<html lang="pt-BR">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Finix Banco - Abrir Conta</title>
    <link rel="stylesheet" href="css/style.css">
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@300;400;500;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <!-- Header -->
    <header class="header">
        <div class="container">
            <div class="logo">
                <h2><i class="fas fa-university"></i> Finix Banco</h2>
            </div>
            <nav class="nav">
                <ul class="nav-list">
                    <li><a href="principal.html#home">Início</a></li>
                    <li><a href="servicos.html">Serviços</a></li>
                    <li><a href="principal.html#contact">Contato</a></li>
                    <li class="login-btn"><a href="#login">Entrar</a></li>
                </ul>
                <div class="hamburger">
                    <span></span>
                    <span></span>
                    <span></span>
                </div>
            </nav>
        </div>
    </header>

    <!-- Hero Section -->
    <section id="home" class="hero">
        <div class="container">
            <h1>Abrir Sua Conta no Finix Banco</h1>
            <p>Comece sua jornada financeira conosco. É rápido e seguro!</p>
            <div class="account-form-container">
                <form id="account-form" class="contact-form">
                    <input type="text" id="nome" placeholder="Seu Nome Completo" required>
                    <input type="email" id="email" placeholder="Seu Email" required>
                    <input type="text" id="cpf" placeholder="CPF (11 dígitos)" pattern="\d{11}" required>
                    <input type="tel" id="telefone" placeholder="Telefone/WhatsApp" required>
                    <select id="tipo-conta" required>
                        <option value="">Tipo de Conta</option>
                        <option value="corrente">Conta Corrente</option>
                        <option value="poupanca">Conta Poupança</option>
                    </select>
                    <textarea placeholder="Observações (opcional)"></textarea>
                    <button type="submit">Abrir Conta</button>
                </form>
            </div>
        </div>
    </section>

    <!-- Login Modal (same as principal) -->
    <div id="login-modal" class="modal">
        <div class="modal-content">
            <span class="close">&times;</span>
            <h2>Login</h2>
            <form class="login-form">
                <input type="email" placeholder="Email" required>
                <input type="password" placeholder="Senha" required>
                <button type="submit">Entrar</button>
            </form>
        </div>
    </div>

    <!-- Footer -->
    <footer class="footer">
        <div class="container">
            <p>&copy; Finix Banco. Todos os direitos reservados. | <a href="#">Política de Privacidade</a> | <a href="#">Termos de Serviço</a></p>
        </div>
    </footer>

    <script>
        // Mobile nav toggle (same)
        const hamburger = document.querySelector('.hamburger');
        const navList = document.querySelector('.nav-list');
        hamburger.addEventListener('click', () => {
            navList.classList.toggle('active');
        });

        // Modal (same)
        const loginBtn = document.querySelector('.login-btn a');
        const modal = document.getElementById('login-modal');
        const close = document.querySelector('.close');
        if (loginBtn) {
            loginBtn.addEventListener('click', (e) => {
                e.preventDefault();
                modal.style.display = 'flex';
            });
        }
        close.addEventListener('click', () => {
            modal.style.display = 'none';
        });
        window.addEventListener('click', (e) => {
            if (e.target === modal) modal.style.display = 'none';
        });

        // Backend-ready account form
        window.handleAccountSubmit = async (formData) => {
            try {
                const response = await fetch('/api/abrir-conta', {
                    method: 'POST',
                    headers: {'Content-Type': 'application/json'},
                    body: JSON.stringify(formData)
                });
                const data = await response.json();
                if (data.success) {
                    alert('Conta solicitada! Aguarde aprovação.');
                } else {
                    alert(data.message || 'Erro na solicitação.');
                }
            } catch (error) {
                alert('Solicitação enviada! Em breve entraremos em contato via email.');
            }
        };

        document.getElementById('account-form').addEventListener('submit', async (e) => {
            e.preventDefault();
            const formData = {
                nome: document.getElementById('nome').value,
                email: document.getElementById('email').value,
                cpf: document.getElementById('cpf').value,
                telefone: document.getElementById('telefone').value,
                tipoConta: document.getElementById('tipo-conta').value
            };
            handleAccountSubmit(formData);
        });
    </script>
</body>
</html>
<div class=""></div>
